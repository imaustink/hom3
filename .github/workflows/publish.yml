name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go test ./...

  create-release:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write
    outputs:
      upload_url: ${{ steps.create.outputs.url }}
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release
        id: create
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

  build:
    runs-on: ubuntu-latest
    needs: create-release
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          EXT=""
          [[ "${{ matrix.goos }}" == "windows" ]] && EXT=".exe"
          go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o "dist/hom3-${{ matrix.goos }}-${{ matrix.goarch }}${EXT}" .

      - name: Upload binary
        uses: softprops/action-gh-release@v2
        with:
          files: dist/hom3-*
